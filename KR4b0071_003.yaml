body:
  text: 卷三石賦連山蔽虧巨石嶔崎上興雲而蔚會下激水而推移舒丹霞于九折混白露于三危鎮方城于漢水固天闕于湯池依島嶼而緜邈住谿壑之嶮巇開五嶽之靈圖集九老之仙都韜神弓于射的產利劍于昆吾魚躍湘鄉之水雁浮平固之湖墮山鵲之金印碎驪龍之寶珠奄藹披衣氤氳翠微精衛取而填海天孫用以支機隨西王而不落傍東武而俱飛爾乃蘊怪含靈懷奇蓄變獸形鳥像畜身人面已休陳倉之雞復舞零陵之燕迎一童于洛陽之水送五婦于成都之縣帝王憩而投壺仙人坐而高宴架滄海之神塘儼夷陵之瑞場發黃金之祕簡隱白玉于仙床雙立天門之郡特起縉雲之堂李廣射而為虎初平叱以成羊圖孔明之八陣亙吳橘之三梁驚神人于武落駭商客于翟塘藝文類聚六初學記五山賦何神山之峻美諒苞結之所成東垂曰泰南服稱衡西戎所擅北狄標名于是堯值洪流滔天襄陵禹敷水土奠高槎木眾川既導群岳自修潛通四瀆鎮壓九州森羅辰象吐吸雲霧深不可測遠不可步於廓靈山長為作固爾其為狀也則武當太和武功太白崑崙五門扶寍三石峰高一萬峭峙三百登而眺之則千里無極俯而臨之則萬仞難測映白鶴而同高混青天而共色藝文類聚七衰桃賦巖巖秀峰吐桂榮松獨夭桃之灼灼輕擢采于寒蹤爾乃萬株成錦千林似翼苔畫波文花然樹色發秦源而逸氣飄漢綬而流芳譬蘭缸之夜炷似明鏡之朝妝成蹊列逕光崖豔氾閒真定之蒼梨雜房陵之縹李芬芳難歇照曜無儔舒若霞光欲起散似電采將收既而風落新枝霜飛故葉歎垂釣之妖童怨傾城之麗妾藝文類聚八十六初學記二十八謝賜錢啟謝賜錢啟豈期疲痾壁立猥蒙殊賜名稱榆莢非投飲馬之橋價重圓泉寍棄呪雞之野暫移周府纔經漢鑄始降王門忽光私室青鳧委質笑夷甫之不言赤仄垂緡重河閒之能數初學記二十七
