body:
  text: 樂府釣竿篇結宇長江側垂釣廣川潯竹竿橫翡翠桂髓擲黃金人來水鳥沒楫度岸花沈蓮搖見魚近綸盡覺潭深渭水終須卜滄浪徒自吟空嗟芳餌下獨見有貪心初學記二十二文苑英華二百十樂府詩集十八詩紀百二度關山度關山關山度曉月劍客遠從征雲中出迥陣天外落奇兵輪摧偃去節樹倒礙懸旌沙揚折坂暗雲積榆溪明馬倦時銜草人疲屢看城寒隴胡笳澀空林漢鼓鳴還聽嗚咽水併切斷腸聲文苑英華百九十八樂府詩集二十七詩紀百二晨雞高樹鳴晨雞振翮鳴出迥擅奇聲蜀郡隨金馬天津應玉衡摧冠驗遠石繫火出連營爭棲斜揭暮解翼橫飛度試飲淮南藥翻上仙都樹枝低且候潮葉淺還承露承露觸嚴霜葉淺伺朝陽猜群怯寶劍勇戰出花場當損黃金距誰論白玉璫長鳴逢晉帝恃氣遇周王流名說魯國分影入陳倉不復愁苻朗猶能感孟嘗文苑英華二百六樂府詩集二十八升菴詩話詩紀百二採桑春樓曙鳥驚蠶妾候初晴迎風金珥落向日玉釵明徙顧移籠影攀鉤動釧聲葉高知手弱枝軟覺身輕人多羞借問年少怯逢迎恐疑夫婿遠聊復答專城文苑英華二百八樂府詩集二十八詩紀百二豔歌行城隅上朝日斜暉照杏梁併捲茱萸帳爭移翡翠床縈環聊向牖拂鏡且調妝裁金作小靨散麝起微黃二八秦樓婦三十侍中郎執戟超丹地豐貂入建章未安文史閣獨結少年場彎弧貫葉影學劍動星芒翠蓋飛城曲金鞍橫道傍調鷹向新市彈雀往睢陽行行稍有極暮暮歸蘭房前瞻富羅綺左顧足鴛鴦蓮舒千葉氣燈吐百枝光滿酌胡姬酒多燒荀令香不學幽閨妾生離怨採桑樂府詩集二十八詩紀百二從軍行從軍行胡兵屯薊北漢將起山西故人輕百戰聊欲定三齊風前噴畫角雲上舞飛梯鴈塞秋聲遠龍沙雲路迷燕然自可勒函谷詎須泥類聚五十九文苑英華百九十九詩紀百二三婦豔詩大婦織殘絲中婦妬蛾眉小婦獨無事歌罷詠新詩上客何須起為待絕纓時樂府詩集三十五詩紀百二置酒高殿上陳王開甲第粉壁麗椒塗高牕侍玉女飛闥敞金鋪名香散綺幕石研彫金鑪清醪稱玉饋浮蟻擅蒼梧鄒嚴恆接武申白日相趨容與升階玉差池曳履珠千金一巧笑百萬兩鬟姝趙姬未鼓瑟齊客罷吹竽歌喧桃與李琴挑鳳將雛魏君慚舉白晉主媿投壺風雲更代序人事有榮枯長卿病消渴壁立還成都樂府詩集三十九詩紀百二門有車馬客行門有車馬客行飛觀霞光啟重門平旦開北闕高箱過東方連騎來紅塵揚翠轂赭汗染龍媒桃花夾逕聚流水傍池回投鞭聊靜電捐軫暫停雷非關萬里客自有六奇才琴和朝雉操酒泛夜光杯舞袖飄金谷歌聲遶鳳臺良時不可再騶馭鬱相催安知太行道失路車輪摧文苑英華百九十五樂府詩集四十詩紀百二白頭吟平生懷直道松桂比真風語默妍媸際沈浮毀譽中讒新恩易盡情去寵難終彈珠金市側抵玉舂山東含香老顏駟執戟異揚雄惆悵崔亭伯幽憂馮敬通王嬙沒胡塞班女棄深宮春苔封履跡秋葉奪妝紅顏如花落槿鬢似雪飄蓬此時積長歎傷年誰復同文苑英華二百七樂府詩集四十一詩紀百二怨詩怨詩新豐妖冶地遊俠競嬌奢池臺間羅綺桃李雜煙霞蓋影分連騎衣香合並車豔粉驚飛蝶紅妝映落花舞衫飄冶袖歌扇掩團紗玉床珠帳卷金樓鏡月斜還疑簫史鳳不及季倫家文苑英華二百十一樂府詩集四十一詩紀百二應龍篇應龍未起時乃在淵底藏非雲足不蹈舉則沖天翔譬彼野蘭草幽居常獨香清風播四遠萬里望芬芳隱居可頤志自見焉得彰樂府詩集六十四詩紀百二輕薄篇洛陽美年少朝日正開霞細蹀連錢馬傍趨苜蓿花揚鞭還卻望春色滿東家井桃映水落門柳雜風斜綿蠻弄清綺蛺蝶遶承華欲往飛廉館遙駐季倫車石榴傳馬腦蘭肴奠象牙聊持自娛樂未是鬭豪奢莫嫌龍馭晚扶桑復浴鴉文苑英華百九十四樂府詩集六十七詩紀百二帝王所居篇崤函惟帝宅宛雒壯皇居紫微臨複道丹水亘通渠沈沈飛雨殿藹藹承明廬兩宮分概日雙闕並凌虛休氣充青瑣榮光入綺疏霞明仁壽鏡日照陵雲書鳴鸞背鳷鵲詔蹕幸儲胥長楊飛玉輦御宿徙金輿柳葉飄緹騎槐花影屬車薄暮歸平樂歌鐘滿玉除文苑英華百九十二詩紀百二朱鷺金堤有朱鷺刷羽望滄瀛周詩振雅曲漢鼓發奇聲時將赤鴈並乍逐彩鸞行別有翻潮處異色不相驚文苑英華二百六樂府詩集十六詩紀百二上之回林光稱避暑回中乃吉行龍媒躡影駛玉輦御雲輕風烏繞鳷鵲綵鷁照昆明欲知鍾箭遠遙聽寶雞聲樂府詩集十六詩紀百二戰城南薊北馳胡騎城南接短兵雲屯兩陣合劍聚七星明旗交無復影角憤有餘聲戰罷披軍策還嗟李少卿文苑英華二百九樂府詩集十七詩紀百二君馬黃二首幽并重騎射征馬正盤桓風去嘶聲遠冰堅度足寒出關聊變色上坂屢停鞍即令隨御史非復在樓蘭文苑英華二百九樂府詩集十七詩紀百二五色乘馬黃追風時滅沒血汗染龍花胡鞍抱秋月唯騰渥洼水不飲長城窟詎待燕昭王千金市駿骨文苑英華二百九樂府詩集十七詩紀百二芳樹奇樹舒春苑流芳入綺錢合歡分四照同心影萬年香浮佳氣裏葉映彩雲前欲識揚雄賦金玉滿甘泉文苑英華二百八樂府詩集十七詩紀百二有所思深閨久離別積怨轉生愁徒思裂帛鴈空上望歸樓看花憶塞草對月想邊秋相思日日度淚臉年年流文苑英華二百二樂府詩集十七詩紀百二雉子斑陳倉雉未飛歛翮依芳甸朱冠色尚淺錦臆毛初變雊麥且專場排花聊勇戰唯當渡弱水不怯如皋箭文苑英華二百六樂府詩集十八詩紀百二臨高臺層臺邇清漢出迥架重棼飛棟臨黃鶴高牕度白雲風前朱幌色霞處綺疏分此中多怨曲地遠詎能聞文苑英華二百十樂府詩集十八詩紀百二隴頭水二首隴頭鳴四注征人逐貳師羌笛含流咽胡笳雜水悲湍高飛轉駛澗淺蕩還遲前旌去不見上路杳無期文苑英華百九十八樂府詩集二十一詩紀百二隴頭流水急流急行難渡遠入隗囂營傍侵酒泉路心交賜寶刀小婦成紈袴欲知別家久戎衣今已故文鏡秘府論西作徐陵文苑英華百九十八樂府詩集二十一詩紀百二折楊柳楊柳半垂空裊裊上春中枝疎董澤箭葉碎楚臣弓色映長河水花飛高樹風莫言限宮掖不閉長楊宮樂府詩集二十二詩紀百二關山月巖間度月華流彩映山斜暈逐連城璧輪隨出塞車唐蓂遙合影秦桂遠分花欲驗盈虛理方知道路賖文苑英華九十八樂府詩集二十三詩紀百二洛陽道曾城啟旦扉上路滿春暉柳影緣溝合槐花夾岸飛蘇合彈珠罷黃間負翳歸紅塵暮不息相看連騎稀文苑英華百九十二樂府詩集二十三詩紀百二梅花落芳樹映雪野發早覺寒侵落遠香風急飛多花逕深周人歎初摽魏帝指前林邊城少灌木折此自悲吟文苑英華二百八樂府詩集二十四詩紀百二紫騮馬將軍入大宛善馬出從戎影絕乾河上聲流水窟中似鹿猶依草如龍欲向空須還十萬里試為一追風文苑英華二百九樂府詩集二十四詩紀百二雨雪曲胡關辛苦地雪路遠漫漫含冰踏馬足雜雨凍旗竿沙漠飛恆暗天山積轉寒無因辭日逐團扇掩齊紈文苑英華百九十三樂府詩集二十四詩紀百二劉生劉生絕名價豪俠恣遊陪金門四姓聚繡轂五香來塵飛瑪瑙勒酒映硨磲杯別有追遊夜秋牕向月開文苑英華百九十六樂府詩集二十四詩紀百二公無渡河金堤分錦纜白馬渡蓮舟風嚴歌響絕浪湧榜人愁櫂折桃花水帆橫竹箭流何言沈璧處千載偶陽侯初學記六文苑英華二百十樂府詩集二十六詩紀百二對酒當歌對玉酒匡坐酌金罍竹葉三清泛蒲萄百味開風移蘭氣入月逐桂香來獨有劉將阮忘情寄羽杯文苑英華九十五樂府詩集二十七詩紀百二銅雀臺淒涼銅雀晚搖落墓田通雲慘當歌日松吟欲舞風人疏瑤席冷曲罷繐帷空可惜年將淚俱盡望陵中類聚三十四文苑英華二百四樂府詩集三十一詩紀百二長安有狹斜行少年重遊俠長安有狹斜路窄時容馬枝高易度車簷高同落照巷小共飛花相逢夾繡轂借問是誰家樂府詩集三十五詩紀百二飲馬長城窟行秋草朔風驚飲馬出長城群驚還怯飲地險更宜行傷冰歛凍足畏冷急寒聲無因度吳坂方復入羌城文苑英華二百九作擬飲馬長城窟樂府詩集三十八詩紀百二泛舟橫大江大江脩且闊揚舲度廻磯波中畫鷁涌帆上錦花飛舟移歷浦月櫂舉濕春衣王孫定若遠詎待送將歸文苑英華百九十三樂府詩集三十八詩紀百二煌煌京洛行千門儼西漢萬戶擅東京凌雲霞上起鳷鵲月中生風塵暮不息蕭筦夜恆鳴唯當賣藥處不入長安城文苑英華百九十二樂府詩集三十九詩紀百二明君詞明君詞寒樹暗胡塵霜樓明漢月淚染上春衣憂變華年髮文苑英華二百四樂府詩集二十九詩紀百二神仙篇瀛洲分渤澥閬苑隔虹蜺欲識三山路須尋千仞溪石梁雲外立蓬丘霧裏迷年深毀丹竈學久棄青泥葛水留還杖天衢鳴去雞六龍驤首起雲閣萬里一別何寥廓玄都府內駕青牛紫蓋山中乘白鶴尋陽杏花終難朽武陵桃花未曾落已見玉女笑投壺復覩仙童欣六博同甘玉文棗俱飲流霞藥鸞歌鳳舞集天台金闕銀宮相向開西王已令青鳥去東海還馭赤虬來魏武還車逢漢女荊王因夢識陽臺鳳蓋隨雲聊蔽日霓裳雜雨復乘雷神嶽吹笙遙謝手當知福地有神才樂府詩集六十四詩紀百二又億舜日萬堯年詠湛露歌采蓮願雜百和氣宛轉金爐前文苑英華百九十三樂府詩集七十四作沈約樂未央詩紀百二前有一樽酒行前有一樽酒主人行壽今日合來坐者當令皆富且壽欲令主人三萬歲終歲不知老為吏當高遷賈市得萬倍桑蠶當大得主人宜子孫文苑英華百九十五樂府詩集六十五詩紀百二
