body:
  text: 附録以下各詩據逯欽立輯本輯倡狂不勝愁結束下清樓草堂詩箋三十九清明詩注匡山曖遠壑灌壘屬中流城花飛照水江月上明樓廬山記一遊人及丘壑秋氣滿平皋路積康成帶門疏仲蔚蒿山明雲氣畫天靜鳥飛高自有東籬菊還持泛濁醪廬山記四搖落山中曙秋氣滿林隈螢光映草頭鳥影出枝來殘暑避日盡斷霞逐風開空返陶潛縣終無宋玉才廬山記四九冬飄遠雪六出表豐年睢陽生玉樹雲夢起瓊田歲華紀麗四
