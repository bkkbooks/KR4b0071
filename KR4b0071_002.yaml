body:
  text: 詩御幸樂遊苑侍宴大君臨四表榮光普八埏區中文化洽海外武功宣鳳下書丹篆龜符著緑編昆明不習戰雲夢豈遊畋軌文通萬國旌節靖三邊高秋藐姑射睿想屬汾川兩宮明合璧雙闕帶非煙揚鑾出城觀詔蹕指郊廛禁苑回雕輦離宮建翠旃流水奔雷轂追風赴電鞭畫熊飄析羽金埒響膠弦鳴玉升文砌稱觴溢綺筵獸舞依鍾石鸞歌應管弦霞明黃鵠路風爽白雲天潦收荷蓋折露重菊花鮮上林賓早鴈長楊唱晚蟬小臣慚藝業擊壤慕懷鉛康衢飛駛羽大海滴微涓詠歌還集木舞蹈遂臨泉願薦南山壽明明奉萬年文苑英華百六十九詩紀百三重陽殿成金石會竟上詩周王興路寢漢后成甘泉共知崇壯麗迢遰與雲連抗殿疏龍首峻陛激天泉東西跨函谷左右矚伊瀍百常飛觀竦三休復道懸拱烏遙造日攑虬遠架煙雲棟疑飛雨風窗似望仙玉女臨芳鏡金璫映彩椽梅梁橫發蕊藻井倒披蓮雲光開御宿佳氣屬祈年霜鴈排空斷寒花映日鮮負扆憑霄極台司列象躔登臺喧大廈御氣響鈞天北斗承三獻南風入五弦鸞歌鳷鵲右獸舞射熊前翔鶤仰不逮燕雀徒聯翩文苑英華三百十一詩紀百三征虜亭送新安王應令鳳吹臨南浦神駕餞東平亭回漳水乘旆轉洛濱笙地凍班輪響風嚴羽蓋輕燒田雲色暗古樹雪花明歧路一回首流襟動睿情類聚二十九文苑英華百七十九作徐陵詩紀百三從籍田應衡陽王教作從籍田應衡陽王教作帝京惟赤縣神居應紫微塗山萬國仰滄海百川歸東郊事平秩仲月祀靈威含光開早扇閶闔啓朝扉洛城鍾漏息靈臺雲霧卷森森虎戟前藹藹鑾旗轉屬車遊絳闕風烏度丹巘帳殿幸金輿旌門擁玉輦玉輦帶非煙金輿映緑川雨師清遠路風伯靜遙天分渠通沃野激水入公田草發青壇外花飛蒼玉前蒼玉臨圭璧青壇躬帝籍冒橛乃三推齊衡均百辟蘭場儼芝駕桂圃芳瑤席山禽韻管弦野獸和鍾石鍾石既相和江海復無波梁客簪裾盛陳王文雅多修途參弱駘喬木間輕蘿幸承濫吹末擊壤自為歌類聚三十九文苑英華百七十九又初學記十四作藉田詩引三四兩章詩紀百三從永陽王遊虎丘山滄波壯鬱島洛邑鎮崇芒未若茲山麗岧嶢擅水鄉地靈侔少室塗艱象太行重巖標虎據九曲峻羊腸溜深澗無底風幽谷自涼寶沈餘玉氣劍隱絶星光白雲多異影丹桂有藂香遠看銀臺竦洞塔耀山莊瑞草生金地天花照石梁類聚八詩紀八百三陪衡陽王遊耆闍寺甘棠聽訟罷福宇試登臨兔苑移飛蓋王城列玳簪階荒猶纍玉地古尚填金龍橋丹桂偃鷲嶺白雲深秋窗被旅葛夏戶響山禽清風吹麥隴細雨濯梅林類聚七十六詩紀百二與錢玄智泛舟高門事休沐朝野恣逢迎還乘金谷水俱望洛陽城舟移津女渡楫動渭橋橫風高鴈已落雨霽水還清葉盡桐門淨花秋菊岸明欲奏江南曲聊習棹歌行類聚七十一御覽七百七十詩紀百三遊匡山簡寂館遊匡山簡寂館三梁澗本絶千仞路猶通即此神山內銀榜映仙宮鏡似臨峰月流如飲澗虹幽桂無斜影深松有徑風惟當遠人望知在白雲中類聚七十八廬山記四廬山紀事三詩紀百三和諸葛覽從軍遊獵和諸葛覽從軍遊獵治兵耀武節縱獵駭畿封迅騎馳千里高罝起百重騰麚斃馬足飢鼯落劍鋒雲根飛燒火鳥道絶禽蹤方羅四流俊聊以習軍戎類聚六十六作和諸葛從軍遊詩初學記二十二詩紀百三山家閨怨王孫春好遊雲鬢不勝愁離鴻暫罷曲別路已經秋山中桂花晚勿為俗人留類聚三十二詩紀百三和陽侯送袁金紫葬和陽侯送袁金紫葬玄泉開隧道白日照佳城一朝嗟此路千載幾傷情秋氣悲松色淒風咽挽聲歸雲向谷晚還柳背山輕唯當三五夜壟月暫時明初學記十四文苑英華三百五作和楊侯送袁金紫葬詩紀百三傷韋侍讀懷經傳北海蘊義盛西河高峰落回照逝水沒驚波柳下悲風急山陽秋氣多宿草摧書帶寒松脆女蘿無復華陰市空餘蒿里歌文苑英華三百二詩紀百三後湖泛舟上苑奢行樂滄池聊薄遊泛荷分蘭棹沈槎觸桂舟殘虹收度雨缺岸上新流欲知有高趣長楊送麥秋類聚七十一御覽七百七十詩紀百三遊龍首城關外山川闊城隅塵霧浮白雲凝絶嶺滄波間斷洲四面觀長薄千里眺平丘河津無桂樹樽酒自淹留類聚二十八詩紀百三別韋諒賦得江湖泛別舟別韋諒賦得江湖泛別舟千里潯陽岸三翼木蘭船鷁泛青鳧後雞鳴白鷺前涵花沒淺纜帶葉動深船不言朝夕水獨自限神仙類聚七十一御覽七百七十詩紀百三星名從軍詩將軍定朔邊刁斗出祁連高柳橫遙塞長榆接遠天井泉含凍竭烽火照山燃欲知客心斷危旌萬里懸類聚五十九作從軍詩初學記一文苑英華百九十九及樂府詩集三十二作從軍行詩紀百三賦得韓信淮陰總漢兵燕齊擅遠聲沈沙擁急水拔幟上危城野有千金報朝稱三傑名所悲雲夢澤空傷狡兔情類聚五十五詩紀百三行經季子廟延州高讓遠傳芳世祀移地絶遺金路松悲懸劍枝野藤侵沸井山雨濕苔碑別有觀風處樂奏無人知類聚三十八文苑英華三百二十詩紀百三賦得落落窮巷士揚雲不邀名原憲本遺榮草長三徑合花發四鄰明塵隨幽巷靜嘯逐遠風清門外無車轍自可絶公卿類聚三十六詩紀百三賦得日中市朝滿雲閣綺霞生旗亭麗日明塵飛三市路蓋入九重城竹葉當壚滿桃花帶綬輕唯見爭名利安知大隱情類聚六十五初學記二十四作日中市朝滿詩詩紀百三賦得題新雲西北春雲起遙臨偃蓋松根危才吐葉氣淺未成峰風前飛未斷日處影疑重體輕無五色詎是得從龍初學記一詩紀百三賦得白雲臨酒白雲蓋濡水流彩入澠川疏葉臨嵇竹輕鱗入鄭船菊泛金枝下峰斷玉山前一朝開五色飄飄映十千初學記一詩紀百三詠雪應衡陽王教九冬飄遠雪六出表豐年睢陽生玉樹雲夢起瓊田入窗輕落粉拂柳駛飛綿欲動淮南賦亂下桂花前初學記二作應衡王教詠雪詩文苑英華百七十九詩紀百三賦得雪映夜舟黃雲迷鳥路白雪下鳧舟分沙映冰浦照鶴聚寒流檣風吹影落纜錦雜花浮船梁若是桂翻如月照秋初學記二十五萬花谷續七作張正見詩詩紀百三又草堂詩箋八城西詩注作賦夜舟得雪歌引浮一韻薄帷鑒明月長河上桂月澄彩照高樓分簾疑碎璧隔幔似垂鉤窗外光恆滿帷中影暫流豈及西園夜長隨飛蓋遊初學記一文苑英華百五十二詩紀百三玄圃觀春雪同雲遙映嶺瑞雪近浮空拂鶴伊川上飄花桂苑中影麗重輪月飛隨團扇風還取長歌處帶曲舞春風初學記二文苑英華百五十四詩紀百三秋河曙耿耿秋河曙耿耿耿耿長河曙濫濫宿雲浮天路橫秋水星衡轉夜流月下姮娥落風驚織女秋德星猶可見仙槎不復留初學記一萬花谷續八詩紀百三浦狹村煙度茅蘭夾兩岸野燎燭中川村長合夜影水狹度浮煙收光暗鳥弋分火照漁船山人不炊桂樵華幸共然初學記二十五萬花谷續八詩紀百三和衡陽王秋夜睢苑涼風舉章臺雲氣收螢光連燭動月影帶河流緑綺朱弦泛黃花素蟻浮高軒揚麗藻即是賦新秋初學記三文苑英華百七十九作衡陽王秋夜應制詩紀百三賦得山卦名蓬萊遁羽客巖穴轉蒙籠雲歸仙井暗霧解石橋通影帶臨峰鶴形隨雜雨風尋師不失路咸欲馭飛鴻類聚七文苑英華百六十詩紀百三初春賦得池應教遙天收密雨高閣映奔曦雪盡青山路冰銷緑水池春光落雲葉花影發晴枝琴樽奉終宴風月豈云疲初學記三文苑英華百七十九作春初賦德池應教詩紀百三賦得垂柳映斜溪千仞清溪險三陽弱柳垂葉細臨湍合根空帶石危風翻夾浦絮雨濯倚流枝不分梅花落還同橫笛吹初學記二十八文苑英華三百二十三作柳映斜溪詩紀百三賦得岸花臨水發奇樹滿春洲落蕊映江浮影間蓮花石光涵濯錦流漾色隨桃水飄香入桂舟別有仙潭菊含芳獨向秋類聚八十八詩紀百三賦得風生翠竹裏應教賦得風生翠竹裏應教金風起燕觀翠竹夾梁池翻花疑鳳下揚水似龍移帶露依深葉飄寒入徑枝聊因萬籟響詎待伶倫吹初學記一文苑英華百五十六詩紀百三賦得山中翠竹修竹映巖垂來風異夾池復澗藏高節重林隱徑枝雲生龍未上花落鳳將移莫言棲嶰谷伶倫不復吹初學記二十八文苑英華三百二十五佚作者名萬花谷後三十八作張正見詩詩紀百三賦得梅林輕雨應教梅樹耿長虹芳林散輕雨蜀郡隨仙去陽臺帶雲聚飄花更濯枝潤石還侵柱詎得零陵燕隨風時共舞初學記二作賦新題梅林輕雨教詩文苑英華百七十九作賦得新題梅林輕雨應教萬花谷後一作張正見詩詩紀百三賦新題得蘭生野徑披襟出蘭畹命酌動幽心鋤罷還開路歌喧自動琴華燈共影落芳杜雜花深莫言間徑裏遂不斷黃金初學記二十七文苑英華三百二十七詩紀百三賦得威鳳棲梧丹山下威鳳來集帝梧中欲舞春花落將飛秋葉空影照龍門水聲入洞庭風別有將雛曲翻更合絲桐類聚九十初學記三十作賦得威鳳棲梧桐文苑英華三百二十八作賦得棲梧桐威鳳萬花谷後四十作張正見詩詩紀百三賦得魚躍水花生漾色桃花水相望濯錦流躍浦疑珠出依池似鏡浮凌波銜落蕊觸餌避沈鉤方遊蓮葉外詎入武王舟類聚九十六文苑英華三百三十詩紀百三賦新題得寒樹晚蟬疏寒蟬噪楊柳朔吹犯梧桐葉迥飛難住枝殘影共空聲疏飲露後唱絶斷弦中還因搖落處寂寞盡秋風類聚九十七作寒樹晚蟬疏詩文苑英華三百三十作賦得新題寒樹晚蟬疏詩紀百三賦得秋蟬喝柳應衡陽王教賦得秋蟬喝柳應衡陽王教秋鴈寫遙天園柳集驚蟬競噪長枝裏爭飛落木前風高知響急樹近覺聲連長楊流喝盡詎識蔡雍弦文苑英華三百三十萬花谷後四十作張正見詩詩紀百三秋日別庾正員征途愁轉旆連騎慘停鑣朔氣凌疏木江風送上潮青雀離帆遠朱鳶別路遙唯有當秋月夜夜上河橋徐孝穆集一文苑英華二百六十六作徐陵類聚二十九詩紀百三賦得佳期竟不歸良人萬里向河源娼婦三秋思柳園路遠寄詩空織錦宵長夢返欲驚魂飛蛾屢繞帷前燭衰草還侵階上玉銜啼拂鏡不成粧促柱繁絃還亂曲時分年移竟不歸偏憎寒急夜縫衣流螢映月明空帳疏葉從風入斷機自對孤鸞向影絶終無一鴈帶書回類聚三十二詩紀百三賦得階前嫩竹翠竹梢雲自結叢輕花嫩筍欲凌空砌曲橫枝屢解籜階前疏葉強來風欲知抱節成龍處當於山路葛陂中類聚八十九詩紀百三
